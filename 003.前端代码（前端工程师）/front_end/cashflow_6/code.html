<!DOCTYPE html><html class="light" lang="zh-CN"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>CashFlow - Register</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Hanken+Grotesk:wght@600;700&amp;family=JetBrains+Mono:wght@500&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@100..900&amp;family=Inter:wght@100..900&amp;display=swap" rel="stylesheet">

        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-tint": "#1d59c1",
                        "secondary-fixed": "#6ffbbe",
                        "on-tertiary": "#ffffff",
                        "inverse-on-surface": "#eaf1ff",
                        "on-tertiary-container": "#ffbfba",
                        "surface-container-highest": "#d3e4fe",
                        "on-secondary-container": "#00714d",
                        "on-tertiary-fixed": "#410004",
                        "on-tertiary-fixed-variant": "#930013",
                        "inverse-primary": "#b0c6ff",
                        "on-secondary": "#ffffff",
                        "surface": "#f8f9ff",
                        "surface-variant": "#d3e4fe",
                        "on-error": "#ffffff",
                        "primary-fixed": "#d9e2ff",
                        "on-primary-container": "#bcceff",
                        "tertiary-container": "#b0111e",
                        "secondary": "#006c49",
                        "error-container": "#ffdad6",
                        "surface-dim": "#cbdbf5",
                        "on-primary-fixed-variant": "#00419c",
                        "on-primary": "#ffffff",
                        "surface-dark": "#0F172A",
                        "background-light": "#F8FAFC",
                        "surface-container-lowest": "#ffffff",
                        "outline": "#737784",
                        "tertiary-fixed": "#ffdad7",
                        "on-error-container": "#93000a",
                        "tertiary": "#870011",
                        "income-emerald": "#10B981",
                        "on-surface": "#0b1c30",
                        "on-secondary-fixed": "#002113",
                        "accent-blue": "#3B82F6",
                        "primary-fixed-dim": "#b0c6ff",
                        "secondary-fixed-dim": "#4edea3",
                        "surface-container-low": "#eff4ff",
                        "expense-rose": "#EF4444",
                        "inverse-surface": "#213145",
                        "primary-container": "#0f52ba",
                        "error": "#ba1a1a",
                        "on-secondary-fixed-variant": "#005236",
                        "secondary-container": "#6cf8bb",
                        "on-background": "#0b1c30",
                        "outline-variant": "#c3c6d5",
                        "on-primary-fixed": "#001945",
                        "tertiary-fixed-dim": "#ffb3ad",
                        "surface-container-high": "#dce9ff",
                        "surface-container": "#e5eeff",
                        "primary": "#003c90",
                        "on-surface-variant": "#434653",
                        "surface-bright": "#f8f9ff",
                        "background": "#f8f9ff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter": "24px",
                        "container-max-width": "1280px",
                        "base": "4px",
                        "margin-mobile": "16px",
                        "margin-desktop": "48px"
                    },
                    "fontFamily": {
                        "title-md": ["Inter"],
                        "body-sm": ["Inter"],
                        "headline-lg-mobile": ["Hanken Grotesk"],
                        "body-lg": ["Inter"],
                        "display-lg": ["Hanken Grotesk"],
                        "data-mono": ["JetBrains Mono"],
                        "label-caps": ["Inter"],
                        "headline-lg": ["Hanken Grotesk"]
                    },
                    "fontSize": {
                        "title-md": ["18px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                        "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "data-mono": ["14px", {"lineHeight": "20px", "fontWeight": "500"}],
                        "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700"}],
                        "headline-lg": ["32px", {"lineHeight": "40px", "fontWeight": "600"}]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #f8f9ff;
            -webkit-tap-highlight-color: transparent;
        }
        .focused-input:focus-within {
            border-color: #003c90;
            box-shadow: 0 0 0 1px #003c90;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="min-h-screen font-body-lg text-on-surface">
<!-- Top App Bar (As specified in JSON logic: Suppress for transactional screens, but request explicitly asked for brand header) -->
<header class="w-full top-0 sticky bg-surface dark:bg-surface-dark flex items-center justify-between px-margin-mobile py-4 z-50">
<div class="flex items-center gap-3">
<div class="w-10 h-10 bg-primary-container rounded-lg flex items-center justify-center text-on-primary-container shadow-sm">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">account_balance_wallet</span>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile font-bold text-primary dark:text-primary-fixed">CashFlow</h1>
</div>
</header>
<main class="px-margin-mobile pt-8 pb-12 max-w-md mx-auto">
<!-- Title & Subtitle -->
<div class="mb-10">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-2">开启您的理财之旅</h2>
<p class="font-body-sm text-body-sm text-on-surface-variant">创建一个账户，轻松管理您的每一分支出与收入</p>
</div>
<!-- Registration Form -->
<form class="space-y-6" id="registrationForm">
<!-- Username -->
<div class="space-y-2">
<label class="font-body-sm text-body-sm font-semibold text-on-surface" for="username">用户名</label>
<div class="relative flex items-center focused-input bg-surface-container-low rounded-xl border border-outline-variant transition-all duration-200">
<span class="material-symbols-outlined absolute left-4 text-outline">person</span>
<input class="w-full bg-transparent border-none py-4 pl-12 pr-4 focus:ring-0 text-on-surface placeholder:text-outline font-body-lg" id="username" placeholder="请输入您的用户名" type="text">
</div>
</div>
<!-- Email -->
<div class="space-y-2">
<label class="font-body-sm text-body-sm font-semibold text-on-surface" for="email">邮箱</label>
<div class="relative flex items-center focused-input bg-surface-container-low rounded-xl border border-outline-variant transition-all duration-200">
<span class="material-symbols-outlined absolute left-4 text-outline">mail</span>
<input class="w-full bg-transparent border-none py-4 pl-12 pr-4 focus:ring-0 text-on-surface placeholder:text-outline font-body-lg" id="email" placeholder="example@cashflow.com" type="email">
</div>
</div>
<!-- Password -->
<div class="space-y-2">
<label class="font-body-sm text-body-sm font-semibold text-on-surface" for="password">密码</label>
<div class="relative flex items-center focused-input bg-surface-container-low rounded-xl border border-outline-variant transition-all duration-200">
<span class="material-symbols-outlined absolute left-4 text-outline">lock</span>
<input class="w-full bg-transparent border-none py-4 pl-12 pr-12 focus:ring-0 text-on-surface placeholder:text-outline font-body-lg" id="password" placeholder="请输入密码" type="password">
<button class="absolute right-4 text-outline hover:text-primary transition-colors" onclick="togglePassword('password')" type="button">
<span class="material-symbols-outlined" id="password_toggle">visibility</span>
</button>
</div>
</div>
<!-- Confirm Password -->
<div class="space-y-2">
<label class="font-body-sm text-body-sm font-semibold text-on-surface" for="confirm_password">确认密码</label>
<div class="relative flex items-center focused-input bg-surface-container-low rounded-xl border border-outline-variant transition-all duration-200">
<span class="material-symbols-outlined absolute left-4 text-outline">lock_clock</span>
<input class="w-full bg-transparent border-none py-4 pl-12 pr-12 focus:ring-0 text-on-surface placeholder:text-outline font-body-lg" id="confirm_password" placeholder="请再次输入密码" type="password">
</div>
</div>
<!-- Agreement -->
<div class="flex items-start gap-3 py-2">
<div class="relative flex items-center">
<input class="w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary-container transition-all cursor-pointer" id="agreement" type="checkbox">
</div>
<label class="font-body-sm text-body-sm text-on-surface-variant cursor-pointer leading-tight" for="agreement">
                    我已阅读并同意 <a class="text-primary font-semibold underline underline-offset-2" href="#">用户协议</a> 和 <a class="text-primary font-semibold underline underline-offset-2" href="#">隐私政策</a>
</label>
</div>
<!-- Register Button -->
<button class="w-full py-4 bg-primary text-white rounded-xl font-title-md text-title-md shadow-lg shadow-primary/20 active:scale-95 transition-all duration-150 flex items-center justify-center gap-2" type="submit">
<span>注册</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
</form>
<!-- Social Login Separator (Maintains consistency with typical mobile login screens) -->
<div class="my-10 flex items-center gap-4">
<div class="h-[1px] flex-1 bg-outline-variant"></div>
<span class="font-label-caps text-label-caps text-outline">或者</span>
<div class="h-[1px] flex-1 bg-outline-variant"></div>
</div>
<!-- Social Buttons -->
<div class="flex gap-4 mb-10">
<button class="flex-1 py-3 flex items-center justify-center border border-outline-variant rounded-xl hover:bg-surface-container transition-colors">
<div class="w-6 h-6 flex items-center justify-center">
<span class="material-symbols-outlined text-on-surface">brand_family</span>
</div>
</button>
<button class="flex-1 py-3 flex items-center justify-center border border-outline-variant rounded-xl hover:bg-surface-container transition-colors">
<div class="w-6 h-6 flex items-center justify-center">
<span class="material-symbols-outlined text-on-surface">mail</span>
</div>
</button>
</div>
<!-- Back to Login -->
<div class="text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                已有账号？ <a class="text-primary font-bold hover:underline underline-offset-4 transition-all" href="#">立即登录</a>
</p>
</div>
</main>
<!-- Visual Decorative Element (Atmospheric Glassmorphism) -->
<div class="fixed -bottom-24 -left-24 w-64 h-64 bg-primary-container/20 rounded-full blur-[80px] -z-10"></div>
<div class="fixed -top-12 -right-12 w-48 h-48 bg-secondary-container/20 rounded-full blur-[60px] -z-10"></div>
<script>
        // Micro-interaction for password visibility
        function togglePassword(id) {
            const input = document.getElementById(id);
            const icon = document.getElementById(id + '_toggle');
            if (input.type === 'password') {
                input.type = 'text';
                icon.innerText = 'visibility_off';
            } else {
                input.type = 'password';
                icon.innerText = 'visibility';
            }
        }

        // Simple form validation feedback
        document.getElementById('registrationForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const agree = document.getElementById('agreement').checked;
            if(!agree) {
                alert('请阅读并勾选用户协议和隐私政策。');
                return;
            }
            
            // Add a temporary loading state
            const btn = e.target.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            btn.innerHTML = '<span class="animate-spin material-symbols-outlined">sync</span> 注册中...';
            btn.disabled = true;
            btn.classList.add('opacity-80');

            setTimeout(() => {
                btn.innerHTML = originalContent;
                btn.disabled = false;
                btn.classList.remove('opacity-80');
                // Normally redirect here
            }, 1500);
        });

        // Input active focus styling behavior
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('bg-white');
            });
            input.addEventListener('blur', () => {
                input.parentElement.classList.remove('bg-white');
            });
        });
    </script>
</body></html>
