<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - CashFlow</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Hanken+Grotesk:wght@600;700&display=swap" rel="stylesheet">
    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }

        .register-container {
            background: var(--surface);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            padding: 48px 40px;
            max-width: 500px;
            width: 90%;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-container {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            width: 80px;
            height: 80px;
            background: var(--primary-color);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }

        .logo span {
            font-size: 40px;
            color: var(--on-primary);
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            color: var(--on-surface);
            margin-bottom: 8px;
        }

        .subtitle {
            color: var(--on-surface-variant);
            font-size: 16px;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--on-surface);
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--outline-variant);
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: var(--surface-container-low);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary-color);
            background: var(--surface);
        }

        .input-group {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--on-surface-variant);
        }

        .form-input.input-with-icon {
            padding-left: 48px;
        }

        .password-strength {
            margin-top: 8px;
            height: 4px;
            background: var(--outline-variant);
            border-radius: 2px;
            overflow: hidden;
        }

        .password-strength-bar {
            height: 100%;
            width: 0%;
            transition: all 0.3s ease;
        }

        .password-strength-text {
            font-size: 12px;
            margin-top: 4px;
            color: var(--on-surface-variant);
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: var(--primary-color);
            color: var(--on-primary);
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 16px;
        }

        .btn-primary:hover {
            background: var(--primary-light);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 60, 144, 0.3);
        }

        .btn-secondary {
            width: 100%;
            padding: 14px;
            background: var(--surface-container-high);
            color: var(--on-surface);
            border: 2px solid var(--outline-variant);
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-secondary:hover {
            background: var(--surface-container);
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        .divider {
            text-align: center;
            margin: 32px 0;
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: var(--outline-variant);
        }

        .divider span {
            background: var(--surface);
            padding: 0 16px;
            position: relative;
            color: var(--on-surface-variant);
            font-size: 14px;
        }

        .login-link {
            text-align: center;
            margin-top: 24px;
            color: var(--on-surface-variant);
            font-size: 14px;
        }

        .login-link a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .error-message {
            color: var(--expense-rose);
            font-size: 12px;
            margin-top: 4px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .form-input.error {
            border-color: var(--expense-rose);
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="logo-container">
            <div class="logo">
                <span class="material-symbols-outlined">account_balance_wallet</span>
            </div>
            <h1>创建账户</h1>
            <p class="subtitle">开启您的财务管理之旅</p>
        </div>

        <!-- CashFlow 工具函数库 -->
    <script src="js/utils.js"></script>

        <form id="registerForm" onsubmit="handleRegister(event)">
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label" for="username">用户名</label>
                    <div class="input-group">
                        <span class="material-symbols-outlined input-icon">person</span>
                        <input type="text" id="username" class="form-input input-with-icon" placeholder="3-20个字符" required>
                    </div>
                    <div class="error-message" id="username-error">用户名必须是3-20个字符</div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="email">邮箱</label>
                    <div class="input-group">
                        <span class="material-symbols-outlined input-icon">email</span>
                        <input type="email" id="email" class="form-input input-with-icon" placeholder="example@email.com" required>
                    </div>
                    <div class="error-message" id="email-error">请输入有效的邮箱地址</div>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">密码</label>
                <div class="input-group">
                    <span class="material-symbols-outlined input-icon">lock</span>
                    <input type="password" id="password" class="form-input input-with-icon" placeholder="至少8位，包含字母和数字" required>
                </div>
                <div class="password-strength">
                    <div class="password-strength-bar" id="strength-bar"></div>
                </div>
                <div class="password-strength-text" id="strength-text">请设置密码</div>
                <div class="error-message" id="password-error">密码至少需要8位，包含字母和数字</div>
            </div>

            <div class="form-group">
                <label class="form-label" for="confirm-password">确认密码</label>
                <div class="input-group">
                    <span class="material-symbols-outlined input-icon">lock</span>
                    <input type="password" id="confirm-password" class="form-input input-with-icon" placeholder="再次输入密码" required>
                </div>
                <div class="error-message" id="confirm-password-error">两次输入的密码不一致</div>
            </div>

            <div class="form-group">
                <label class="form-label" for="phone">手机号</label>
                <div class="input-group">
                    <span class="material-symbols-outlined input-icon">phone</span>
                    <input type="tel" id="phone" class="form-input input-with-icon" placeholder="请输入手机号" required>
                </div>
                <div class="error-message" id="phone-error">请输入有效的手机号</div>
            </div>

            <div class="form-group">
                <label class="form-label">
                    <input type="checkbox" id="terms" style="margin-right: 8px;">
                    我已阅读并同意
                    <a href="#" style="color: var(--primary-color); text-decoration: none;">《用户协议》</a>
                    和
                    <a href="#" style="color: var(--primary-color); text-decoration: none;">《隐私政策》</a>
                </label>
                <div class="error-message" id="terms-error">请同意用户协议和隐私政策</div>
            </div>

            <button type="submit" class="btn-primary">注册</button>
            <button type="button" class="btn-secondary" onclick="goToLogin()">返回登录</button>
        </form>

        <div class="divider">
            <span>或者</span>
        </div>

        <div class="login-link">
            已有账户？<a href="login.html">立即登录</a>
        </div>
    </div>

    <script>
        // 检查用户名
        document.getElementById('username').addEventListener('blur', function() {
            const username = this.value;
            const error = document.getElementById('username-error');

            if (username && (username.length < 3 || username.length > 20)) {
                this.classList.add('error');
                error.classList.add('show');
            } else {
                this.classList.remove('error');
                error.classList.remove('show');
            }
        });

        // 检查邮箱
        document.getElementById('email').addEventListener('blur', function() {
            const email = this.value;
            const error = document.getElementById('email-error');

            if (email && !CashFlowUtils.validation.email(email)) {
                this.classList.add('error');
                error.classList.add('show');
            } else {
                this.classList.remove('error');
                error.classList.remove('show');
            }
        });

        // 检查密码强度
        document.getElementById('password').addEventListener('input', function() {
            const password = this.value;
            const strengthBar = document.getElementById('strength-bar');
            const strengthText = document.getElementById('strength-text');

            let strength = 0;
            let text = '';
            let color = '';

            if (password.length >= 8) strength++;
            if (/[a-z]/.test(password)) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^A-Za-z0-9]/.test(password)) strength++;

            if (password.length === 0) {
                text = '请设置密码';
                color = '';
            } else if (strength <= 2) {
                text = '密码强度：弱';
                color = '#EF4444';
            } else if (strength <= 3) {
                text = '密码强度：中';
                color = '#F59E0B';
            } else {
                text = '密码强度：强';
                color = '#10B981';
            }

            strengthBar.style.width = (password.length ? (strength * 20) : 0) + '%';
            strengthBar.style.backgroundColor = color;
            strengthText.textContent = text;
            strengthText.style.color = color;
        });

        // 确认密码
        document.getElementById('confirm-password').addEventListener('blur', function() {
            const password = document.getElementById('password').value;
            const confirmPassword = this.value;
            const error = document.getElementById('confirm-password-error');

            if (confirmPassword && password !== confirmPassword) {
                this.classList.add('error');
                error.classList.add('show');
            } else {
                this.classList.remove('error');
                error.classList.remove('show');
            }
        });

        // 检查手机号
        document.getElementById('phone').addEventListener('blur', function() {
            const phone = this.value;
            const error = document.getElementById('phone-error');

            if (phone && !CashFlowUtils.validation.phone(phone)) {
                this.classList.add('error');
                error.classList.add('show');
            } else {
                this.classList.remove('error');
                error.classList.remove('show');
            }
        });

        // 检查协议
        document.getElementById('terms').addEventListener('change', function() {
            const error = document.getElementById('terms-error');
            if (!this.checked) {
                error.classList.add('show');
            } else {
                error.classList.remove('show');
            }
        });

        // 处理注册
        function handleRegister(event) {
            event.preventDefault();

            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const phone = document.getElementById('phone').value;
            const terms = document.getElementById('terms').checked;

            // 验证表单
            let isValid = true;

            if (username.length < 3 || username.length > 20) {
                document.getElementById('username').classList.add('error');
                document.getElementById('username-error').classList.add('show');
                isValid = false;
            }

            if (!CashFlowUtils.validation.email(email)) {
                document.getElementById('email').classList.add('error');
                document.getElementById('email-error').classList.add('show');
                isValid = false;
            }

            if (!CashFlowUtils.validation.password(password)) {
                document.getElementById('password').classList.add('error');
                document.getElementById('password-error').classList.add('show');
                isValid = false;
            }

            if (password !== confirmPassword) {
                document.getElementById('confirm-password').classList.add('error');
                document.getElementById('confirm-password-error').classList.add('show');
                isValid = false;
            }

            if (!CashFlowUtils.validation.phone(phone)) {
                document.getElementById('phone').classList.add('error');
                document.getElementById('phone-error').classList.add('show');
                isValid = false;
            }

            if (!terms) {
                document.getElementById('terms-error').classList.add('show');
                isValid = false;
            }

            if (!isValid) {
                CashFlowUtils.notification.error('请检查表单中的错误');
                return;
            }

            // 模拟注册
            setTimeout(() => {
                // 创建新用户
                const newUser = {
                    id: Date.now(),
                    username: username,
                    email: email,
                    phone: phone,
                    displayName: username,
                    avatar: 'https://via.placeholder.com/80',
                    createdAt: new Date().toISOString()
                };

                // 自动登录
                CashFlowUtils.login(newUser);

                // 注册成功提示
                CashFlowUtils.notification.success('注册成功！欢迎加入 CashFlow');

                // 跳转到主页
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);
            }, 1000);
        }

        // 返回登录
        function goToLogin() {
            window.location.href = 'login.html';
        }

        // 页面加载时检查是否已登录
        document.addEventListener('DOMContentLoaded', function() {
            if (CashFlowUtils.getCurrentUser()) {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
